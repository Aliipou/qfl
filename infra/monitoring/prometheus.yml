global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: qfl-platform
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: qfl_coordinator
    static_configs:
      - targets: ["coordinator:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
