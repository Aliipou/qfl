# ============================================================
# QFL Platform — Nginx Reverse Proxy / CDN Layer
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # --------------------------------------------------------
    # Security
    # --------------------------------------------------------
    server_tokens off;
    more_clear_headers Server;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/m;
    limit_req_zone $binary_remote_addr zone=train_limit:10m rate=10r/m;

    # Connection limits
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --------------------------------------------------------
    # Logging
    # --------------------------------------------------------
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"request_id":"$http_x_request_id"}';

    access_log /var/log/nginx/access.log json_combined;

    # --------------------------------------------------------
    # TLS settings
    # --------------------------------------------------------
    ssl_protocols TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # --------------------------------------------------------
    # HTTPS server
    # --------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name qfl.local;

        ssl_certificate /etc/nginx/certs/qfl.crt;
        ssl_certificate_key /etc/nginx/certs/qfl.key;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        limit_conn conn_limit 20;

        # API proxy
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://coordinator:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;

            # Remove sensitive headers from response
            proxy_hide_header X-Powered-By;
        }

        # Training endpoint — tighter rate limit
        location /api/train {
            limit_req zone=train_limit burst=5 nodelay;
            proxy_pass http://coordinator:8000/train;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static docs
        location /docs {
            proxy_pass http://coordinator:8000/docs;
        }

        # Health (no rate limit for load balancers)
        location /health {
            proxy_pass http://coordinator:8000/health;
            access_log off;
        }
    }

    # --------------------------------------------------------
    # HTTP → HTTPS redirect
    # --------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
