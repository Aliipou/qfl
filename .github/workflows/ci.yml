name: QFL Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/qfl-coordinator

jobs:
  # ============================================================
  # Lint
  # ============================================================
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy api/ core/ sdk/ --ignore-missing-imports

  # ============================================================
  # Unit Tests
  # ============================================================
  unit-tests:
    name: Unit Tests (100% coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ tests/quantum/ \
            --cov=api --cov=core \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage.xml
          fail_ci_if_error: false

  # ============================================================
  # Integration Tests
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qfldb
          POSTGRES_USER: qfl
          POSTGRES_PASSWORD: qfl_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379/0
          POSTGRES_DSN: postgresql+asyncpg://qfl:qfl_secret@localhost:5432/qfldb
        run: pytest tests/integration/ -v

  # ============================================================
  # Security Scan
  # ============================================================
  security:
    name: Security Scan (Trivy + Bandit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r api/ core/ sdk/ -ll --exit-zero

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ============================================================
  # Docker Build + Push
  # ============================================================
  docker-build:
    name: Docker Build + Push
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push coordinator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.coordinator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ============================================================
  # Deploy to kind (staging)
  # ============================================================
  deploy-staging:
    name: Deploy to kind cluster (staging)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: qfl-staging

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy coordinator
        run: |
          helm upgrade --install qfl-coordinator infra/helm/coordinator \
            --namespace qfl \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 3m

      - name: Smoke test
        run: |
          kubectl port-forward -n qfl svc/qfl-coordinator 8000:8000 &
          sleep 5
          curl -f http://localhost:8000/health
